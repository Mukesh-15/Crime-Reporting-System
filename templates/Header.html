<header class="bg-white shadow-sm">
  <div class="max-w-screen-xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <a href="/" class="flex items-center">
        <svg class="h-8 w-8 text-blue-600 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span class="font-bold text-xl text-blue-600">CrimeTracker</span>
      </a>

      <!-- Nav Links (Desktop) -->
      <nav class="hidden md:flex items-center space-x-4">
        <a href="/" class="text-gray-700 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">Dashboard</a>
        <a href="{% url 'report_crime'%}" class="text-gray-700 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">Report Crime</a>
        <a href="/analytics" class="text-gray-700 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">Analytics</a>
      </nav>

      <!-- Right Buttons -->
      <div class="flex items-center space-x-3">
        <!-- Notification Bell -->
        <button class="relative p-2 rounded-full hover:bg-gray-100">
          <svg class="h-5 w-5 text-gray-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full px-1.5 py-0.5 h-5 min-w-[1.25rem] flex items-center justify-center">3</span>
        </button>

        <!-- User Menu -->
        <div class="relative group">
          <button class="flex items-center gap-2 p-2 rounded hover:bg-gray-100">
            <a href="view-profile/"><div class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center text-sm font-medium">{{user.username.upper.0}}</div></a>
            <a class="hidden lg:inline text-gray-800" href="view-profile/"><span class="hidden lg:inline text-gray-800">{{user.username.capitalize}}</span></a>
            
            
          </button>
          <!-- Dropdown -->
          <div class="absolute right-0 mt-2 w-48 bg-white border shadow-md rounded-md text-sm hidden group-hover:block z-50">
            <div class="p-2 font-medium text-gray-900">{{user.username}}</div>
            <div class="px-4 py-1 text-gray-500">{% if user.is_staff %}
              Police
              {% else %}
              Citizen
              {% endif %}
            </div>
            <div class="px-4 py-1 text-gray-500">{{user.email}}</div>
            <a href="{% url 'logout' %}" class="flex items-center px-4 py-2 text-red-500 hover:bg-gray-100">
              <svg class="h-4 w-4 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 11-6 0v-1"/>
              </svg>
              Logout
            </a>
          </div>
        </div>

        <!-- Mobile Menu Button -->
        <button onclick="toggleMobileMenu()" class="md:hidden p-2">
          <svg class="h-6 w-6 text-gray-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</header>

<!-- Mobile Slide-out Menu -->
<div id="mobileMenu" class="fixed top-0 right-0 w-64 h-full bg-white shadow-lg transform translate-x-full transition-transform duration-300 z-50 md:hidden">
  <div class="flex justify-between items-center p-4 border-b">
    <div class="flex items-center">
      <svg class="h-6 w-6 text-blue-600 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <span class="font-bold text-blue-600">CrimeTracker</span>
    </div>
    <button onclick="toggleMobileMenu()" class="text-gray-500 hover:text-red-600">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <nav class="p-4 space-y-4">
    <a href="/" class="flex items-center text-gray-700 hover:text-blue-600">
      <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M3 13h18M3 6h18M3 18h18"/>
      </svg>
      Dashboard
    </a>
    <a href="/report" class="flex items-center text-gray-700 hover:text-blue-600">
      <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M9 12h6m-6 4h6m-7 4h8a2 2 0 002-2V6a2 2 0 00-2-2H7a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      Report Crime
    </a>
    <a href="/analytics" class="flex items-center text-gray-700 hover:text-blue-600">
      <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M3 3v18h18"/>
      </svg>
      Analytics
    </a>
    <a href="{% url 'logout' %}" class="flex items-center text-red-500 hover:text-red-700">
      <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M17 16l4-4m0 0l-4-4m4 4H7"/>
      </svg>
      Logout
    </a>
  </nav>
</div>

<script>
  function toggleMobileMenu() {
    const menu = document.getElementById("mobileMenu");
    menu.classList.toggle("translate-x-full");
  }
</script>
