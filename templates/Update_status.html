<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Crime Report</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">Update Crime Report</h2>
        
        <form action="{% url 'update_report' report.id %}" method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="reportId" class="form-label">Report ID</label>
                <input type="text" class="form-control" id="reportId" name="reportId" readonly value="{{ report.id }}">
            </div>
            
            <div class="mb-3">
                <label for="adminNotes" class="form-label">Ongoing Situation</label>
                <textarea class="form-control" id="adminNotes" name="adminNotes" rows="4" 
                          placeholder="Describe the current situation...">{{ report.admin_notes }}</textarea>
            </div>
            
            <div class="mb-3">
                <label for="status" class="form-label">Update Status</label>
                <select class="form-select" id="status" name="status">
                    <option value="Pending" {% if report.status == 'Pending' %}selected{% endif %}>Pending</option>
                    <option value="Under Investigation" {% if report.status == 'Under Investigation' %}selected{% endif %}>Under Investigation</option>
                    <option value="Resolved" {% if report.status == 'Resolved' %}selected{% endif %}>Resolved</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary">Update Report</button>
            <a href="{% url 'admin_dashboard' %}" class="btn btn-secondary ms-2">Cancel</a>
        </form>
    </div>
</body>
</html>
