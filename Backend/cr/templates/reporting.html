{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>crime Reporting</title>
    <link rel="stylesheet" href="{% static 'styles/reporting.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
</head>
<body>
    <form action="Submit-crime" method="post">
      {% csrf_token %}
        <div class="form-group col-md-4">
            <label for="inputState">Type of Report</label>
            <select id="inputState" class="form-control" name="type_of_report">
              <option selected>Choose...</option>
              <option>Missing items</option>
              <option>Violent crime</option>
              <option>Kidnapping</option>
              <option>Theft</option>
              <option>Sexual assault</option>
              <option>Drug offences</option>
              <option>Fraud</option>
              <option>Other</option>
            </select>
          </div>
        <div class="form-group">
          <label for="exampleFormControlTextarea1">Discription</label>
          <textarea class="form-control" id="exampleFormControlTextarea1" rows="3" name="dis"></textarea>
        </div>
        <div class="form-group">
            <label for="exampleFormControlFile1">Example file input</label>
            <input type="file" class="form-control-file" id="exampleFormControlFile1" onchange="previewImage(event)">
            <br>
            <img class="preview" id="preview" alt="Preview Image">
          </div>
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
    <script>
      var image = document.getElementById('preview');
      image.style.display = "none";

      function previewImage(event) {
        var input = event.target;
        
        if (input.files && input.files[0]) {
           var reader = new FileReader();
           reader.onload = function(e) {
              image.src = e.target.result;
           }
           image.style.display = "block";
           reader.readAsDataURL(input.files[0]);
        }
     }
    </script>
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
</body>
</html>
